<head>
    <style>
        body.light {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color: white;
            color: black;
        }

        body.dark {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
            color: white;
        }

        .button {
            color: inherit;
            background-color: inherit;
        }

    </style>

</head>

<body>
    <h1>Olá mundo!</h1>
    <p> Lorem ipsum, dolor sit amet consectetur adipisicing elit. In nam voluptates, eum reiciendis, iste assumenda odio
        dicta placeat magni excepturi tempora saepe fuga? Quasi eius facilis beatae, omnis nesciunt quis.</p>

    <button id="toggleMode" class="button">Alternar Tema</button>

    <script>

        const toggleMode = document.getElementById("toggleMode");

        toggleMode.addEventListener("click", () => {
            alert("atenção: tema da pagina alterado")
            document.body.classList.toggle("dark");
            document.body.classList.toggle("light");
        });


    </script>

</body>
